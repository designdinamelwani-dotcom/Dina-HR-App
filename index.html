function executeAITool(name,input,props,attachment){
  const {employees,customers,saveCustomers,jobs,saveJobs,appts,saveAppts,quotes,saveQuotes,tasks,saveTasks,inventory,saveInventory,work,saveWork,workDate,addPhoto}=props;
  try{
    switch(name){
      case "book_appointment":{
        const cf=findCustomerFz(customers,input.customer_name);
        if(cf.candidates.length) return {error:`More than one customer matches "${input.customer_name}": ${cf.candidates.map(c=>c.name).join(", ")}. Which one did you mean?`};
        const jf=input.job_id?findJobFz(jobs,input.job_id):{match:null,candidates:[]};
        const appt={id:uid("APT"),type:input.type||"Consultation / Meeting",client:cf.match?cf.match.name:input.customer_name,customerId:cf.match?cf.match.id:"",job:jf.match?jf.match.id:"",date:input.date,time:input.time||"11:00",notes:input.notes||"",status:"Scheduled"};
        if(!appt.date) return {error:"A date is required to book an appointment."};
        saveAppts([...appts,appt]);
        return {success:true,summary:`Booked ${appt.type} for ${appt.client} on ${fmtDate(appt.date)} at ${appt.time}.`};
      }
      case "update_appointment_status":{
        const cf=findCustomerFz(customers,input.customer_name);
        let candidates=appts.filter(a=>(cf.match?a.customerId===cf.match.id:a.client.toLowerCase().includes(String(input.customer_name||"").toLowerCase()))&&(!input.date||a.date===input.date));
        if(candidates.length===0) return {error:`No appointment found for "${input.customer_name}"${input.date?` on ${input.date}`:""}.`};
        if(candidates.length>1) return {error:`Multiple appointments match — please specify the date. Found: ${candidates.map(a=>fmtDate(a.date)+" "+a.time+" "+a.type).join("; ")}.`};
        const appt=candidates[0];
        saveAppts(appts.map(a=>a.id===appt.id?{...a,status:input.status}:a));
        return {success:true,summary:`Marked the ${appt.type} for ${appt.client} on ${fmtDate(appt.date)} as ${input.status}.`};
      }
      case "create_customer":{
        const nc={id:uid("CUS"),name:input.name,phone:input.phone||"",email:input.email||"",address:"",vip:!!input.vip,source:input.source||"Other",
          measurements:{bust:"",waist:"",hip:"",height:"",sleeve:"",shoulder:"",inseam:"",notes:""},
          notesLog:input.note?[{id:uid("NOTE"),date:workDate,author:"AI Assistant",text:input.note}]:[],
          refPhotos:[],createdDate:workDate,active:true};
        saveCustomers([...customers,nc]);
        return {success:true,summary:`Created a new customer record for ${nc.name}.`,customerId:nc.id};
      }
      case "update_customer":{
        const cf=findCustomerFz(customers,input.customer_name);
        if(cf.candidates.length) return {error:`More than one customer matches "${input.customer_name}": ${cf.candidates.map(c=>c.name).join(", ")}. Which one?`};
        if(!cf.match) return {error:`No customer found matching "${input.customer_name}".`};
        const patch={};
        ["phone","email","source"].forEach(k=>{if(input[k]!=null)patch[k]=input[k];});
        if(input.vip!=null)patch.vip=input.vip;
        if(input.active!=null)patch.active=input.active;
        saveCustomers(customers.map(c=>c.id===cf.match.id?{...c,...patch}:c));
        return {success:true,summary:`Updated ${cf.match.name}'s record.`};
      }
      case "add_customer_note":{
        const cf=findCustomerFz(customers,input.customer_name);
        if(cf.candidates.length) return {error:`More than one customer matches "${input.customer_name}": ${cf.candidates.map(c=>c.name).join(", ")}. Which one?`};
        if(!cf.match) return {error:`No customer found matching "${input.customer_name}".`};
        const note={id:uid("NOTE"),date:workDate,author:"AI Assistant",text:input.note};
        saveCustomers(customers.map(c=>c.id===cf.match.id?{...c,notesLog:[note,...(c.notesLog||[])]}:c));
        return {success:true,summary:`Added a note to ${cf.match.name}'s file.`};
      }
      case "create_job":{
        const cf=findCustomerFz(customers,input.customer_name);
        if(cf.candidates.length) return {error:`More than one customer matches "${input.customer_name}": ${cf.candidates.map(c=>c.name).join(", ")}. Which one?`};
        const stream=STREAMS.includes(input.stream)?input.stream:"Customer (Bespoke)";
        const pre=stream==="Farfetch"?"FF-":stream==="Fashion Show"?"SHOW-":stream==="Reproduction"?"REP-":"JOB-";
        const job={id:pre+uid("").split("-")[1],stream,client:cf.match?cf.match.name:input.customer_name,customerId:cf.match?cf.match.id:"",
          project:input.project,productType:PRODUCT_TYPE[stream],delivery:input.delivery_date,status:"Confirmed",
          team:input.team||"",pay:input.payment_status||"Unpaid",stage:pathFor(stream)[0],value:input.value||0,
          sizing:isStandard(stream)?{custom:false,sizes:{}}:{custom:true,measurements:""},
          costing:{materials:[],embroidery:0,outsource:0,price:input.value||0}};
        job.schedule=autoSchedule(job,workDate);
        saveJobs([...jobs,job]);
        return {success:true,summary:`Created order ${job.id} for ${job.client} — "${job.project}", due ${fmtDate(job.delivery)}.`,jobId:job.id};
      }
      case "update_job_stage":{
        const jf=findJobFz(jobs,input.job_ref);
        if(jf.candidates.length) return {error:`More than one order matches "${input.job_ref}": ${jf.candidates.map(j=>j.id+" ("+j.project+")").join(", ")}. Which one?`};
        if(!jf.match) return {error:`No order found matching "${input.job_ref}".`};
        const path=pathFor(jf.match.stream);
        const stageMatch=path.find(s=>s.toLowerCase()===String(input.stage||"").toLowerCase());
        if(!stageMatch) return {error:`"${input.stage}" is not a valid stage for ${jf.match.id} (stream: ${jf.match.stream}). Valid stages are: ${path.join(", ")}.`};
        saveJobs(jobs.map(j=>j.id===jf.match.id?{...j,stage:stageMatch,status:stageMatch===lastStage(j.stream)?"Delivered":j.status}:j));
        return {success:true,summary:`Moved ${jf.match.id} (${jf.match.project}) to "${stageMatch}".`};
      }
      case "update_job":{
        const jf=findJobFz(jobs,input.job_ref);
        if(jf.candidates.length) return {error:`More than one order matches "${input.job_ref}": ${jf.candidates.map(j=>j.id+" ("+j.project+")").join(", ")}. Which one?`};
        if(!jf.match) return {error:`No order found matching "${input.job_ref}".`};
        const patch={};
        if(input.payment_status)patch.pay=input.payment_status;
        if(input.delivery_date)patch.delivery=input.delivery_date;
        if(input.value!=null)patch.value=input.value;
        if(input.team!=null)patch.team=input.team;
        if(input.status)patch.status=input.status;
        saveJobs(jobs.map(j=>j.id===jf.match.id?{...j,...patch}:j));
        return {success:true,summary:`Updated ${jf.match.id} (${jf.match.project}).`};
      }
      case "add_job_note":{
        const jf=findJobFz(jobs,input.job_ref);
        if(jf.candidates.length) return {error:`More than one order matches "${input.job_ref}": ${jf.candidates.map(j=>j.id+" ("+j.project+")").join(", ")}. Which one?`};
        if(!jf.match) return {error:`No order found matching "${input.job_ref}".`};
        const field=input.note_type==="embroidery"?"embroideryNotes":input.note_type==="delivery"?"deliveryNotes":"productionNotes";
        saveJobs(jobs.map(j=>j.id===jf.match.id?{...j,[field]:(j[field]?j[field]+"\\n":"")+input.text}:j));
        return {success:true,summary:`Added a ${input.note_type} note to ${jf.match.id}.`};
      }
      case "add_work_entry":{
        const ef=findEmployeeFz(employees,input.employee_name);
        if(ef.candidates.length) return {error:`More than one employee matches "${input.employee_name}": ${ef.candidates.map(e=>e.name).join(", ")}. Which one?`};
        if(!ef.match) return {error:`No active employee found matching "${input.employee_name}".`};
        const jf=findJobFz(jobs,input.job_ref);
        if(jf.candidates.length) return {error:`More than one order matches "${input.job_ref}": ${jf.candidates.map(j=>j.id+" ("+j.project+")").join(", ")}. Which one?`};
        if(!jf.match) return {error:`No order found matching "${input.job_ref}".`};
        const entry={id:uid("WRK"),date:input.date||workDate,emp:ef.match.id,job:jf.match.id,task:TASK_TYPES.includes(input.task)?input.task:"Stitching",start:input.start_time,end:input.end_time,done:input.done||"",remarks:"",approvalStatus:"Approved",createdBy:""};
        saveWork([entry,...work]);
        return {success:true,summary:`Logged ${hoursBetween(entry.start,entry.end)}h for ${ef.match.name} on ${jf.match.id} (${entry.task}).`};
      }
      case "add_task":{
        const ef=findEmployeeFz(employees,input.assignee_name);
        if(ef.candidates.length) return {error:`More than one employee matches "${input.assignee_name}": ${ef.candidates.map(e=>e.name).join(", ")}. Which one?`};
        if(!ef.match) return {error:`No active employee found matching "${input.assignee_name}".`};
        const jf=input.job_ref?findJobFz(jobs,input.job_ref):{match:null,candidates:[]};
        const task={id:uid("TSK"),title:input.title,assignee:ef.match.id,job:jf.match?jf.match.id:"",dueDate:input.due_date,priority:TASK_PRIORITY.includes(input.priority)?input.priority:"Normal",status:"To Do",notes:input.notes||""};
        saveTasks([...tasks,task]);
        return {success:true,summary:`Created task "${task.title}" for ${ef.match.name}, due ${fmtDate(task.dueDate)}.`};
      }
      case "update_task_status":{
        const tf=findTaskFz(tasks,input.task_ref);
        if(tf.candidates.length) return {error:`More than one task matches "${input.task_ref}": ${tf.candidates.map(t=>t.title).join(", ")}. Which one?`};
        if(!tf.match) return {error:`No task found matching "${input.task_ref}".`};
        saveTasks(tasks.map(t=>t.id===tf.match.id?{...t,status:input.status}:t));
        return {success:true,summary:`Marked "${tf.match.title}" as ${input.status}.`};
      }
      case "add_inventory_item":{
        const item={id:uid("INV"),name:input.name,category:input.category||"Other",unit:input.unit||"pieces",qtyOnHand:input.qty_on_hand||0,reorderLevel:input.reorder_level||0,costPerUnit:input.cost_per_unit||0,supplier:input.supplier||"",supplierContact:"",notes:""};
        saveInventory([...inventory,item]);
        return {success:true,summary:`Added "${item.name}" to stock — ${item.qtyOnHand} ${item.unit} on hand.`};
      }
      case "update_inventory":{
        const inf=findInvFz(inventory,input.item_ref);
        if(inf.candidates.length) return {error:`More than one stock item matches "${input.item_ref}": ${inf.candidates.map(i=>i.name).join(", ")}. Which one?`};
        if(!inf.match) return {error:`No stock item found matching "${input.item_ref}".`};
        const patch={};
        if(input.qty_on_hand!=null)patch.qtyOnHand=input.qty_on_hand;
        if(input.reorder_level!=null)patch.reorderLevel=input.reorder_level;
        if(input.cost_per_unit!=null)patch.costPerUnit=input.cost_per_unit;
        if(input.supplier!=null)patch.supplier=input.supplier;
        saveInventory(inventory.map(i=>i.id===inf.match.id?{...i,...patch}:i));
        return {success:true,summary:`Updated stock for "${inf.match.name}".`};
      }
      case "create_quotation":{
        const cf=findCustomerFz(customers,input.customer_name);
        if(cf.candidates.length) return {error:`More than one customer matches "${input.customer_name}": ${cf.candidates.map(c=>c.name).join(", ")}. Which one?`};
        const jf=input.job_ref?findJobFz(jobs,input.job_ref):{match:null,candidates:[]};
        const quote={id:nextQuoteNo(quotes),job:jf.match?jf.match.id:"",client:cf.match?cf.match.name:input.customer_name,customerId:cf.match?cf.match.id:"",
          project:jf.match?jf.match.project:input.description,date:workDate,validDays:14,photo:null,refSheetUrl:"",
          items:[{photo:null,description:input.description,originalPrice:input.original_price||0,discount:input.discount||0}],
          vat:!!input.apply_vat,status:"Draft",terms:"Quotation valid for 14 days from the date above.",bankDetails:defaultBankText(props.cfg)};
        saveQuotes([...quotes,quote]);
        const t=quoteTotals(quote);
        return {success:true,summary:`Created quotation ${quote.id} for ${quote.client} — ${aed(t.total)} total.`};
      }
      case "attach_photo":{
        if(!attachment) return {error:"No photo was attached to this message."};
        if(input.target_type==="customer_reference"){
          const cf=findCustomerFz(customers,input.target_ref);
          if(cf.candidates.length) return {error:`More than one customer matches "${input.target_ref}". Which one?`};
          if(!cf.match) return {error:`No customer found matching "${input.target_ref}".`};
          saveCustomers(customers.map(c=>c.id===cf.match.id?{...c,refPhotos:[...(c.refPhotos||[]),{id:uid("PH"),data:attachment.data,caption:input.caption||""}]}:c));
          return {success:true,consumedAttachment:true,summary:`Added the photo to ${cf.match.name}'s reference gallery.`};
        }
        const jf=findJobFz(jobs,input.target_ref);
        if(jf.candidates.length) return {error:`More than one order matches "${input.target_ref}". Which one?`};
        if(!jf.match) return {error:`No order found matching "${input.target_ref}".`};
        addPhoto(jf.match.id,{id:uid("PH"),data:attachment.data,caption:input.caption||""});
        return {success:true,consumedAttachment:true,summary:`Added the photo to ${jf.match.id}'s gallery.`};
      }
      default:
        return {error:"Unknown action: "+name};
    }
  }catch(e){
    return {error:"Something went wrong while doing that: "+e.message};
  }
}
function historyToApiMessages(history){
  return history.filter(m=>m.role==="user"||m.role==="assistant").map(m=>({role:m.role,content:m.text||"."}));
}
async function callClaudeAPI(systemPrompt,msgs,tools,relayUrl,relayKey){
  let resp;
  const useRelay=!!(relayUrl&&relayUrl.trim());
  const url=useRelay?relayUrl.trim().replace(/\/$/,""):"https://api.anthropic.com/v1/messages";
  const headers=useRelay?{"Content-Type":"application/json","X-Relay-Key":relayKey||""}:{"Content-Type":"application/json"};
  try{
    resp=await fetch(url,{
      method:"POST",headers,
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1500,system:systemPrompt,messages:msgs,tools})
    });
  }catch(netErr){
    const e=new Error("network");e.aiKind="network";throw e;
  }
  const raw=await resp.text();
  let data;
  try{ data=JSON.parse(raw); }
  catch(parseErr){
    const e=new Error("nonjson");e.aiKind=useRelay?"api":"env";e.detail=raw.slice(0,120);throw e;
  }
  if(!resp.ok || data.type==="error" || data.error){
    const msg=(data.error&&data.error.message)||data.message||("HTTP "+resp.status);
    const e=new Error(msg);
    if(useRelay){
      e.aiKind=resp.status===401?"relayauth":"api";
    } else {
      e.aiKind=(resp.status===401||resp.status===403||/api key|x-api-key|authentication|credit/i.test(msg))?"env":"api";
    }
    throw e;
  }
  if(!Array.isArray(data.content)){
    const e=new Error("noContent");e.aiKind=useRelay?"api":"env";throw e;
  }
  return data;
}
function aiErrorMessage(e){
  const kind=e&&e.aiKind;
  if(kind==="network") return "I can't reach the assistant service from here. The AI features need a live internet connection — please check your connection and try again.";
  if(kind==="env") return "The AI Assistant only works when this app is opened inside the Claude.ai preview window (where it's authorised to use AI), or when an AI relay is configured. It looks like neither is available right now.\n\nEverything else in the app works fully offline — only the chat assistant needs the Claude.ai preview or a relay. Open this artifact from within Claude.ai, or add your relay details under House, Branding & Banking → AI Assistant connection.";
  if(kind==="relayauth") return "Your relay rejected this request — the Relay Key saved in House, Branding & Banking → AI Assistant connection doesn't match the one set on your Cloudflare Worker. Double-check both match exactly.";
  return "I hit a problem talking to the assistant service"+(e&&e.message?` (${e.message})`:"")+". Please try again in a moment.";
}
const AI_STARTERS=["What's due this week?","Which jobs are delayed?","Show outstanding balances","Who has fittings tomorrow?"];
function AIAssistant(props){
  const {open,onOpen,onClose,cfg,workDate}=props;
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");
  const [busy,setBusy]=useState(false);
  const [attachedPhoto,setAttachedPhoto]=useState(null);
  const [listening,setListening]=useState(false);
  const [conn,setConn]=useState("unknown"); // unknown | ok | env | network
  const [checking,setChecking]=useState(false);
  const bodyRef=useRef();
  const recogRef=useRef(null);
  const fileRef=useRef();

  useEffect(()=>{(async()=>{
    const saved=await store.get("dm:aiChat");
    if(saved&&saved.length)setMessages(saved);
  })();},[]);
  useEffect(()=>{store.set("dm:aiChat",messages.slice(-40));},[messages]);
  useEffect(()=>{if(bodyRef.current)bodyRef.current.scrollTop=bodyRef.current.scrollHeight;},[messages,busy,open]);
  const testConnection=async()=>{
    setChecking(true);
    try{
      await callClaudeAPI("Reply with the single word: ready.",[{role:"user",content:"ping"}],[],cfg.aiRelayUrl,cfg.aiRelayKey);
      setConn("ok");
    }catch(e){
      setConn(e&&e.aiKind==="network"?"network":e&&e.aiKind==="relayauth"?"relayauth":"env");
    }finally{setChecking(false);}
  };
  useEffect(()=>{if(open&&conn==="unknown"&&!checking)testConnection();},[open]);

  const startVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Voice input isn't supported in this browser. Try Chrome or Edge, or just type your request.");return;}
    if(listening){recogRef.current&&recogRef.current.stop();return;}
    const r=new SR();
    r.lang="en-US";r.interimResults=false;r.maxAlternatives=1;
    r.onresult=(e)=>{const text=e.results[0][0].transcript;setInput(prev=>(prev?prev+" ":"")+text);};
    r.onend=()=>setListening(false);
    r.onerror=()=>setListening(false);
    recogRef.current=r;setListening(true);r.start();
  };
  const pickPhoto=async e=>{const file=e.target.files[0];if(!file)return;try{const data=await resizeImage(file,900,0.7);setAttachedPhoto({data,name:file.name});}catch(err){alert("Could not read that image.");}e.target.value="";};

  const send=async(overrideText)=>{
    const userText=(overrideText!=null?overrideText:input).trim();
    if(!userText&&!attachedPhoto)return;
    const myAttachment=attachedPhoto;
    const userMsg={role:"user",text:userText||"(photo attached)",photo:myAttachment?myAttachment.data:null};
    const historyForApi=[...messages,userMsg];
    setMessages(historyForApi);
    setInput("");setAttachedPhoto(null);setBusy(true);
    try{
      let apiMsgs=historyToApiMessages(historyForApi);
      // Working copy so sequential tool calls within this one turn always see the latest
      // data, even though React state from a setX() call doesn't update this closure
      // until the next render. Each save* also writes through to the real app state.
      const working={employees:props.employees,customers:props.customers,jobs:props.jobs,appts:props.appts,quotes:props.quotes,tasks:props.tasks,inventory:props.inventory,work:props.work};
      const liveProps={
        get employees(){return working.employees;},
        get customers(){return working.customers;},saveCustomers:v=>{working.customers=v;props.saveCustomers(v);},
        get jobs(){return working.jobs;},saveJobs:v=>{working.jobs=v;props.saveJobs(v);},
        get appts(){return working.appts;},saveAppts:v=>{working.appts=v;props.saveAppts(v);},
        get quotes(){return working.quotes;},saveQuotes:v=>{working.quotes=v;props.saveQuotes(v);},
        get tasks(){return working.tasks;},saveTasks:v=>{working.tasks=v;props.saveTasks(v);},
        get inventory(){return working.inventory;},saveInventory:v=>{working.inventory=v;props.saveInventory(v);},
        get work(){return working.work;},saveWork:v=>{working.work=v;props.saveWork(v);},
        workDate:props.workDate,cfg:props.cfg,addPhoto:props.addPhoto,
      };
      let pendingAttachment=myAttachment;
      let finalText="";let loop=0;
      while(loop<4){
        loop++;
        const snapshot=buildAISnapshot(liveProps);
        const systemPrompt=AI_SYSTEM_PROMPT(cfg,workDate)+"\n\nLIVE DATA SNAPSHOT (JSON):\n"+JSON.stringify(snapshot);
        const data=await callClaudeAPI(systemPrompt,apiMsgs,AI_TOOLS,cfg.aiRelayUrl,cfg.aiRelayKey);
        const toolUses=(data.content||[]).filter(b=>b.type==="tool_use");
        const textBlocks=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
        if(textBlocks)finalText=textBlocks;
        if(toolUses.length===0)break;
        apiMsgs.push({role:"assistant",content:data.content});
        const toolResults=[];
        for(const tu of toolUses){
          const result=executeAITool(tu.name,tu.input,liveProps,pendingAttachment);
          if(result&&result.consumedAttachment)pendingAttachment=null;
          toolResults.push({type:"tool_result",tool_use_id:tu.id,content:JSON.stringify(result)});
        }
        apiMsgs.push({role:"user",content:toolResults});
      }
      setMessages(prev=>[...prev,{role:"assistant",text:finalText||"Done."}]);
    }catch(e){
      setMessages(prev=>[...prev,{role:"assistant",text:aiErrorMessage(e),error:true}]);
    }finally{
      setBusy(false);
    }
  };
  const clearChat=()=>{if(confirm("Start a new conversation? This clears the chat history shown here."))setMessages([]);};

  if(!open) return <button className="ai-fab" onClick={onOpen} aria-label="Open AI Assistant"><Ico d={icons.spark} size={24}/></button>;

  return (<div className="ai-panel">
    <div className="ai-head">
      <div className="ai-mono">{(cfg.logoMark||LOGO_MARK)?<img src={cfg.logoMark||LOGO_MARK} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<Ico d={icons.spark} size={15}/>}</div>
      <div style={{flex:1}}><h4>Atelier Assistant</h4><div className="sub">AI Business Assistant</div></div>
      <button className="icon-btn" style={{borderColor:"transparent",color:"var(--gold-soft)"}} onClick={clearChat} title="New conversation">↺</button>
      <button className="icon-btn" style={{borderColor:"transparent",color:"#F3ECE1"}} onClick={onClose}>×</button>
    </div>
    {checking&&<div className="ai-banner checking"><span>Checking the assistant connection…</span></div>}
    {!checking&&conn==="env"&&<div className="ai-banner env"><Ico d={icons.warn} size={15}/><span><b>Assistant offline in this window.</b> {cfg.aiRelayUrl?"The relay didn't respond as expected.":"It connects automatically inside the Claude.ai preview, or anywhere once you add a relay (House, Branding & Banking → AI Assistant connection)."} Everything else in the app works normally here. <button style={{background:"none",border:"none",textDecoration:"underline",color:"inherit",padding:0,cursor:"pointer",fontSize:"inherit"}} onClick={()=>{testConnection();}}>Re-check</button></span></div>}
    {!checking&&conn==="relayauth"&&<div className="ai-banner env"><Ico d={icons.warn} size={15}/><span><b>Relay key mismatch.</b> The Relay Key saved here doesn't match the one on your Cloudflare Worker. <button style={{background:"none",border:"none",textDecoration:"underline",color:"inherit",padding:0,cursor:"pointer",fontSize:"inherit"}} onClick={()=>{testConnection();}}>Re-check</button></span></div>}
    {!checking&&conn==="network"&&<div className="ai-banner network"><Ico d={icons.warn} size={15}/><span><b>No connection.</b> The assistant needs internet access. <button style={{background:"none",border:"none",textDecoration:"underline",color:"inherit",padding:0,cursor:"pointer",fontSize:"inherit"}} onClick={()=>{testConnection();}}>Re-check</button></span></div>}
    <div className="ai-body" ref={bodyRef}>
      {messages.length===0&&<div className="ai-msg bot">Good {workDate?"":""}day! Ask me anything about your customers, orders, schedule, payments or stock — or tell me what to do, like "book a fitting for Sharifa next Tuesday at 11" or "move DM26-02602 to stitching."</div>}
      {messages.map((m,i)=>(<div key={i} className={"ai-msg "+(m.role==="user"?"user":"bot")+(m.error?" err":"")}>
        {m.photo&&<img src={m.photo} alt="" style={{width:90,height:112,objectFit:"cover",borderRadius:4,display:"block",marginBottom:6}}/>}
        {m.text}
      </div>))}
      {busy&&<div className="ai-typing"><span/><span/><span/></div>}
    </div>
    {messages.length===0&&<div className="ai-suggest">{AI_STARTERS.map(s=><button key={s} onClick={()=>send(s)}>{s}</button>)}</div>}
    {attachedPhoto&&<div className="ai-attach-chip"><img src={attachedPhoto.data} alt=""/><span>{attachedPhoto.name}</span><button className="icon-btn" style={{width:20,height:20,padding:0,border:"none"}} onClick={()=>setAttachedPhoto(null)}>×</button></div>}
    <div className="ai-foot">
      <button className="ai-iconbtn" onClick={()=>fileRef.current.click()} title="Attach a photo"><Ico d={icons.image} size={16}/></button>
      <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={pickPhoto}/>
      <button className={"ai-iconbtn"+(listening?" on":"")} onClick={startVoice} title="Voice input"><Ico d={icons.mic} size={16}/></button>
      <textarea rows={1} placeholder="Ask or tell the assistant to do something…" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}/>
      <button className="ai-iconbtn send" onClick={()=>send()} disabled={busy} title="Send"><Ico d={icons.send} size={15}/></button>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
