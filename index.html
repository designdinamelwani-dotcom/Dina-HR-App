<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dina Melwani · HR & Production Cloud AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --canvas:#F1ECE3;--paper:#FBF8F2;--paper-2:#F6F1E8;--ink:#221C19;--ink-soft:#6E655C;--ink-faint:#9A8F83;
    --oxblood:#7A2E3A;--oxblood-deep:#5E222C;--gold:#AE8A4E;--gold-soft:#C9AA72;--line:#DCD3C5;--line-soft:#E7DFD2;
    --present:#4F6B4A;--absent:#A63D3D;--late:#B0894F;--leave:#5F718A;--half:#806F95;
    --radius:3px;--shadow:0 1px 2px rgba(34,28,25,.05), 0 8px 28px -16px rgba(34,28,25,.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--canvas);color:var(--ink);font-family:"Hanken Grotesk",system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  .mono{font-family:"Spline Sans Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums;}
  .serif{font-family:"Fraunces",Georgia,serif;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:13px;color:var(--ink);}
  ::selection{background:rgba(122,46,58,.16);}
  :focus-visible{outline:2px solid var(--oxblood);outline-offset:2px;}
  .app{display:flex;min-height:100vh;}
  .sidebar{width:236px;flex-shrink:0;background:var(--ink);color:#E9E1D6;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;border-right:1px solid #000;}
  .brand{padding:26px 22px 20px;border-bottom:1px solid rgba(233,225,214,.12);}
  .monogram{width:42px;height:42px;border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:14px;color:var(--gold-soft);}
  .brand h1{font-family:"Fraunces",serif;font-weight:400;font-size:18px;letter-spacing:.04em;margin:0;color:#F3ECE1;line-height:1.15;}
  .brand .sub{font-size:9.5px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold-soft);margin-top:7px;}
  .nav{flex:1;padding:14px 12px;overflow-y:auto;}
  .nav-label{font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:rgba(233,225,214,.4);padding:14px 12px 7px;}
  .nav-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;color:rgba(233,225,214,.78);padding:9px 12px;border-radius:var(--radius);font-size:13.5px;letter-spacing:.01em;transition:background .15s,color .15s;position:relative;}
  .nav-item:hover{background:rgba(233,225,214,.06);color:#F3ECE1;}
  .nav-item.active{background:rgba(174,138,78,.14);color:#F6EEE2;}
  .nav-item.active::before{content:"";position:absolute;left:0;top:7px;bottom:7px;width:2px;background:var(--gold);border-radius:2px;}
  .nav-item .ico{width:17px;height:17px;flex-shrink:0;opacity:.85;}
  .nav-item.soon{opacity:.45;cursor:not-allowed;}
  .nav-item .tag{margin-left:auto;font-size:8.5px;letter-spacing:.14em;border:1px solid rgba(233,225,214,.25);padding:1px 5px;border-radius:2px;}
  .sidebar-foot{padding:14px 18px;border-top:1px solid rgba(233,225,214,.12);font-size:10px;color:rgba(233,225,214,.4);letter-spacing:.04em;}
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{height:62px;background:var(--paper);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:0 28px;position:sticky;top:0;z-index:20;}
  .topbar .crumb{font-family:"Fraunces",serif;font-size:17px;letter-spacing:.01em;}
  .topbar .crumb em{font-style:italic;color:var(--oxblood);}
  .topbar .spacer{flex:1;}
  .datepick{display:flex;align-items:center;gap:9px;}
  .datepick label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);}
  .field-date{border:1px solid var(--line);background:var(--paper-2);border-radius:var(--radius);padding:7px 10px;font-size:12.5px;color:var(--ink);}
  .view{padding:28px;max-width:1180px;width:100%;margin:0 auto;animation:rise .4s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
  .page-head .eyebrow{font-size:9.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
  .page-head h2{font-family:"Fraunces",serif;font-weight:380;font-size:30px;margin:0;letter-spacing:.005em;line-height:1.05;}
  .page-head p.lede{color:var(--ink-soft);max-width:580px;margin:9px 0 0;font-size:13px;}
  .btn{border:1px solid var(--ink);background:var(--ink);color:#F3ECE1;padding:9px 16px;border-radius:var(--radius);font-size:12.5px;letter-spacing:.04em;display:inline-flex;align-items:center;gap:7px;transition:opacity .15s,transform .05s;}
  .btn:hover{opacity:.88;}
  .btn:active{transform:translateY(1px);}
  .btn.ghost{background:transparent;color:var(--ink);border-color:var(--line);}
  .btn.ghost:hover{border-color:var(--ink);opacity:1;}
  .btn.wine{background:var(--oxblood);border-color:var(--oxblood);}
  .btn.sm{padding:6px 11px;font-size:11.5px;}
  .btn.danger{background:transparent;color:var(--absent);border-color:rgba(166,61,61,.4);}
  .btn.danger:hover{background:rgba(166,61,61,.08);}
  .icon-btn{background:none;border:1px solid var(--line-soft);border-radius:var(--radius);padding:5px 7px;color:var(--ink-soft);}
  .icon-btn:hover{border-color:var(--ink);color:var(--ink);}
  .grid{display:grid;gap:16px;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
  .card-h{padding:15px 18px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:10px;}
  .card-h h3{font-family:"Fraunces",serif;font-weight:430;font-size:15.5px;margin:0;letter-spacing:.01em;}
  .card-h .count{margin-left:auto;font-size:11px;color:var(--ink-faint);letter-spacing:.06em;}
  .card-b{padding:18px;}
  .plates{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
  .plate{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:16px 17px;position:relative;overflow:hidden;}
  .plate::after{content:"";position:absolute;left:17px;right:17px;bottom:0;height:2px;background:linear-gradient(90deg,var(--accent,var(--gold)),transparent);opacity:.5;}
  .plate .pl-label{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);}
  .plate .pl-val{font-family:"Fraunces",serif;font-size:34px;font-weight:380;margin-top:6px;line-height:1;}
  .plate .pl-val small{font-size:14px;color:var(--ink-faint);font-family:"Hanken Grotesk";margin-left:3px;}
  .plate .pl-meta{font-size:11px;color:var(--ink-soft);margin-top:8px;}
  .brief{background:radial-gradient(120% 120% at 100% 0,rgba(174,138,78,.06),transparent 55%),var(--paper);border:1px solid var(--line);border-top:2px solid var(--oxblood);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 30px 28px;position:relative;}
  .brief .seal{position:absolute;top:22px;right:26px;width:54px;height:54px;border-radius:50%;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--oxblood);background:radial-gradient(circle at 50% 35%,#fff8ec,#f0e6d2);font-family:"Fraunces",serif;font-size:19px;letter-spacing:.02em;box-shadow:inset 0 0 0 3px rgba(255,255,255,.5);}
  .brief .dateline{font-family:"Fraunces",serif;font-style:italic;font-size:13px;color:var(--oxblood);letter-spacing:.02em;}
  .brief .b-title{font-family:"Fraunces",serif;font-weight:380;font-size:24px;margin:5px 0 16px;letter-spacing:.01em;}
  .brief .b-body{max-width:660px;}
  .brief .b-body p{font-size:14.5px;line-height:1.62;color:#332b27;margin:0 0 12px;}
  .brief .lead::first-letter{font-family:"Fraunces",serif;font-size:46px;line-height:.8;float:left;margin:5px 9px 0 0;color:var(--oxblood);font-weight:420;}
  .brief .flags{margin-top:8px;display:flex;flex-direction:column;gap:8px;}
  .brief .flag{display:flex;gap:10px;align-items:flex-start;font-size:13px;padding-left:14px;border-left:2px solid var(--gold);}
  .brief .flag b{color:var(--oxblood-deep);}
  .brief .sign{margin-top:20px;padding-top:14px;border-top:1px solid var(--line-soft);font-family:"Fraunces",serif;font-style:italic;font-size:12.5px;color:var(--ink-soft);}
  .tbl-wrap{overflow-x:auto;}
  table.tbl{width:100%;border-collapse:collapse;font-size:12.8px;}
  table.tbl thead th{text-align:left;font-weight:600;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap;}
  table.tbl tbody td{padding:11px 14px;border-bottom:1px solid var(--line-soft);vertical-align:middle;}
  table.tbl tbody tr:hover{background:var(--paper-2);}
  table.tbl tbody tr:last-child td{border-bottom:none;}
  .num{text-align:right;font-variant-numeric:tabular-nums;}
  .nowrap{white-space:nowrap;}
  .muted{color:var(--ink-soft);}
  .faint{color:var(--ink-faint);}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;letter-spacing:.02em;padding:3px 9px;border-radius:20px;border:1px solid;white-space:nowrap;}
  .pill .dot{width:6px;height:6px;border-radius:50%;}
  .pill.present{color:var(--present);border-color:rgba(79,107,74,.35);background:rgba(79,107,74,.08);}
  .pill.absent{color:var(--absent);border-color:rgba(166,61,61,.35);background:rgba(166,61,61,.07);}
  .pill.late{color:var(--late);border-color:rgba(176,137,79,.4);background:rgba(176,137,79,.08);}
  .pill.leave{color:var(--leave);border-color:rgba(95,113,138,.35);background:rgba(95,113,138,.08);}
  .pill.half{color:var(--half);border-color:rgba(128,111,149,.35);background:rgba(128,111,149,.08);}
  .pill.neutral{color:var(--ink-soft);border-color:var(--line);background:var(--paper-2);}
  .pill.gold{color:var(--gold);border-color:rgba(174,138,78,.4);background:rgba(174,138,78,.08);}
  .pill.wine{color:var(--oxblood);border-color:rgba(122,46,58,.3);background:rgba(122,46,58,.06);}
  .form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px 18px;}
  .fld{display:flex;flex-direction:column;gap:5px;}
  .fld.full{grid-column:1/-1;}
  .fld label{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);}
  .fld input,.fld select,.fld textarea{border:1px solid var(--line);background:var(--paper-2);border-radius:var(--radius);padding:9px 11px;transition:border-color .15s,background .15s;width:100%;}
  .fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--oxblood);background:#fff;outline:none;}
  .fld textarea{resize:vertical;min-height:62px;}
  .scrim{position:fixed;inset:0;background:rgba(34,28,25,.42);backdrop-filter:blur(2px);z-index:60;display:flex;justify-content:flex-end;animation:fade .2s ease;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .drawer{width:560px;max-width:94vw;background:var(--canvas);height:100%;overflow-y:auto;box-shadow:-20px 0 40px -20px rgba(0,0,0,.4);animation:slidein .26s cubic-bezier(.2,.7,.2,1);}
  @keyframes slidein{from{transform:translateX(30px);opacity:.6;}to{transform:none;opacity:1;}}
  .drawer-h{padding:22px 26px 18px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px;background:var(--paper);position:sticky;top:0;z-index:2;}
  .drawer-h .eyebrow{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);}
  .drawer-h h3{font-family:"Fraunces",serif;font-weight:400;font-size:21px;margin:5px 0 0;}
  .drawer-b{padding:24px 26px;}
  .drawer-f{padding:18px 26px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:var(--paper);position:sticky;bottom:0;}
  .close-x{margin-left:auto;background:none;border:none;font-size:22px;line-height:1;color:var(--ink-faint);}
  .close-x:hover{color:var(--ink);}
  .sec-label{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);margin:22px 0 10px;padding-top:16px;border-top:1px solid var(--line-soft);}
  .empty{text-align:center;padding:48px 20px;color:var(--ink-soft);}
  .empty .e-mark{font-family:"Fraunces",serif;font-size:40px;color:var(--line);}
  .empty p{margin:10px 0 16px;}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .toolbar .search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--paper-2);border-radius:var(--radius);padding:8px 11px;}
  .toolbar .search input{border:none;background:none;width:100%;outline:none;}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;flex-wrap:wrap;}
  .seg button{background:var(--paper-2);border:none;padding:7px 12px;font-size:11.5px;color:var(--ink-soft);border-right:1px solid var(--line);}
  .seg button:last-child{border-right:none;}
  .seg button.on{background:var(--ink);color:#F3ECE1;}
  .stages{display:flex;gap:3px;align-items:center;flex-wrap:wrap;}
  .stage-dot{width:9px;height:9px;border-radius:50%;border:1px solid var(--line);background:var(--paper-2);}
  .stage-dot.done{background:var(--present);border-color:var(--present);}
  .stage-dot.current{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 2px rgba(174,138,78,.2);}
  .bar-row{display:grid;grid-template-columns:140px 1fr 70px;gap:12px;align-items:center;padding:7px 0;}
  .bar-track{height:9px;background:var(--paper-2);border:1px solid var(--line-soft);border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--oxblood),var(--gold));}
  .note{background:var(--paper-2);border:1px dashed var(--line);border-radius:var(--radius);padding:13px 16px;font-size:12px;color:var(--ink-soft);display:flex;gap:10px;}
  .note b{color:var(--ink);}
  .progress-line{display:flex;align-items:center;gap:0;margin:6px 0 2px;flex-wrap:wrap;row-gap:10px;}
  .step{display:flex;flex-direction:column;align-items:center;flex:1;min-width:54px;position:relative;}
  .step .ring{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);background:var(--paper);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ink-faint);z-index:2;}
  .step.done .ring{background:var(--oxblood);border-color:var(--oxblood);color:#fff;}
  .step.current .ring{border-color:var(--gold);color:var(--oxblood);box-shadow:0 0 0 3px rgba(174,138,78,.18);}
  .step .lbl{font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);margin-top:6px;text-align:center;max-width:62px;line-height:1.2;}
  .step.done .lbl,.step.current .lbl{color:var(--ink-soft);}
  .step .line{position:absolute;top:12px;left:50%;width:100%;height:1.5px;background:var(--line);z-index:1;}
  .step.done .line{background:var(--oxblood);}
  .thumb{width:74px;height:92px;object-fit:cover;border-radius:var(--radius);border:1px solid var(--line);flex-shrink:0;background:var(--paper-2);cursor:pointer;}
  .thumb.empty{display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:9px;text-align:center;letter-spacing:.1em;text-transform:uppercase;padding:6px;}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;}
  .gal-item{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--paper);}
  .gal-img{width:100%;height:120px;object-fit:cover;display:block;cursor:pointer;background:var(--paper-2);}
  .gal-cap{border:none;border-top:1px solid var(--line-soft);background:var(--paper);padding:6px 8px;font-size:11px;width:100%;outline:none;}
  .gal-rm{position:absolute;top:5px;right:5px;background:rgba(34,28,25,.75);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;line-height:1;cursor:pointer;}
  .gal-add{border:1px dashed var(--line);border-radius:var(--radius);height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--ink-soft);background:var(--paper-2);font-size:11px;letter-spacing:.06em;cursor:pointer;}
  .gal-add:hover{border-color:var(--oxblood);color:var(--oxblood);}
  .lightbox{position:fixed;inset:0;background:rgba(20,16,14,.86);z-index:90;display:flex;align-items:center;justify-content:center;padding:30px;animation:fade .2s;}
  .lightbox img{max-width:92vw;max-height:88vh;border-radius:var(--radius);box-shadow:0 30px 80px -20px rgba(0,0,0,.7);}
  .lightbox .lb-x{position:absolute;top:20px;right:24px;color:#fff;background:none;border:1px solid rgba(255,255,255,.4);border-radius:50%;width:38px;height:38px;font-size:18px;}
  .timeline{overflow-x:auto;}
  .tl-inner{min-width:680px;}
  .tl-head{display:grid;grid-template-columns:186px 1fr;border-bottom:1px solid var(--line);}
  .tl-head .tl-axis{position:relative;height:30px;}
  .tl-tick{position:absolute;top:0;bottom:0;border-left:1px solid var(--line-soft);padding-left:5px;font-size:9.5px;color:var(--ink-faint);letter-spacing:.04em;}
  .tl-row{display:grid;grid-template-columns:186px 1fr;border-bottom:1px solid var(--line-soft);align-items:center;}
  .tl-row:last-child{border-bottom:none;}
  .tl-label{padding:11px 14px;display:flex;gap:9px;align-items:center;min-width:0;}
  .tl-label .ti{width:30px;height:38px;object-fit:cover;border-radius:2px;border:1px solid var(--line);flex-shrink:0;}
  .tl-track{position:relative;height:54px;}
  .tl-grid{position:absolute;top:0;bottom:0;border-left:1px solid var(--line-soft);}
  .tl-today{position:absolute;top:0;bottom:0;width:2px;background:var(--oxblood);opacity:.5;z-index:3;}
  .tl-bar{position:absolute;top:16px;height:22px;border-radius:11px;display:flex;align-items:center;padding:0 4px;z-index:2;box-shadow:inset 0 0 0 1px rgba(255,255,255,.25);}
  .tl-dot{position:absolute;top:9px;width:11px;height:11px;border-radius:50%;border:2px solid var(--paper);z-index:4;transform:translateX(-50%);}
  .tl-flag{position:absolute;top:6px;font-size:9px;color:#fff;background:var(--absent);padding:1px 6px;border-radius:9px;z-index:4;white-space:nowrap;}
  .switch{position:relative;width:42px;height:23px;border-radius:13px;background:var(--line);border:none;cursor:pointer;transition:background .18s;flex-shrink:0;}
  .switch.on{background:var(--oxblood);}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;transition:transform .18s;box-shadow:0 1px 3px rgba(0,0,0,.25);}
  .switch.on::after{transform:translateX(19px);}
  pre.code{background:#221C19;color:#E9E1D6;border-radius:var(--radius);padding:16px 18px;font-family:"Spline Sans Mono",monospace;font-size:11.5px;line-height:1.55;overflow-x:auto;white-space:pre;}
  .size-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
  .size-cell{border:1px solid var(--line);border-radius:var(--radius);padding:7px 6px;text-align:center;background:var(--paper-2);}
  .size-cell label{font-size:9px;letter-spacing:.08em;color:var(--ink-faint);display:block;margin-bottom:4px;}
  .size-cell input{width:100%;border:1px solid var(--line);border-radius:2px;padding:4px;text-align:center;font-family:"Spline Sans Mono",monospace;font-size:12px;background:#fff;}
  .cost-line{display:grid;grid-template-columns:1fr 60px 90px 28px;gap:8px;align-items:center;margin-bottom:7px;}
  .cost-line input{border:1px solid var(--line);border-radius:2px;padding:6px 8px;background:var(--paper-2);font-size:12px;}
  .cost-total{display:flex;justify-content:space-between;padding:7px 0;font-size:13px;border-bottom:1px solid var(--line-soft);}
  .cost-total.grand{border-bottom:none;border-top:1px solid var(--line);margin-top:4px;padding-top:10px;font-family:"Fraunces",serif;font-size:15px;}

function autoSchedule(job,fromISO){
  const path=pathFor(job.stream);
  const ci=Math.max(0,path.indexOf(job.stage));
  const remaining=path.slice(ci);
  const totalDays=Math.max(remaining.length,daysBetween(fromISO,job.delivery));
  const sched=path.slice(0,ci).map(s=>({stage:s,date:"",assignee:teamForStage(s),done:true,estHours:0}));
  remaining.forEach((s,i)=>{
    const dt = i===remaining.length-1 ? job.delivery : shiftISO(fromISO,Math.max(1,Math.round(totalDays*(i+1)/remaining.length)));
    sched.push({stage:s,date:dt,assignee:teamForStage(s),done:false,estHours:0});
  });
  return sched;
}

function stageCapacityCheck(stage,fromISO,employees,cfg){
  const hoursPerDay=cfg.standardHours||9;
  const days=Math.max(1,daysBetween(fromISO,stage.date));
  const avail=deptHeadcount(employees,stage.assignee);
  const capacityHours=avail*hoursPerDay*days;
  const needHours=Number(stage.estHours)||0;
  const neededHeadcount=needHours>0?Math.ceil(needHours/(hoursPerDay*days)):0;
  const shortfall=Math.max(0,neededHeadcount-avail);
  const shortHours=Math.max(0,round1(needHours-capacityHours));
  const otPerPerson=avail>0?round1(shortHours/avail):0;
  const otPerPersonPerDay=avail>0?round1(otPerPerson/days):0;
  return {days,avail,capacityHours,needHours,neededHeadcount,shortfall,shortHours,otPerPerson,otPerPersonPerDay,ok:needHours<=capacityHours};
}
function deptCapacityOverHorizon(dept,jobs,workDate,horizon,employees,cfg){
  const hoursPerDay=cfg.standardHours||9;
  let demand=0;
  jobs.forEach(j=>(j.schedule||[]).forEach(s=>{
    if(s.done||!s.date||s.assignee!==dept)return;
    const off=daysBetween(workDate,s.date);
    if(off>=0&&off<=horizon)demand+=Number(s.estHours)||0;
  }));
  const avail=deptHeadcount(employees,dept);
  const capacityHours=avail*hoursPerDay*horizon;
  const neededHeadcount=demand>0?Math.ceil(demand/(hoursPerDay*horizon)):0;
  const shortfall=Math.max(0,neededHeadcount-avail);
  const shortHours=Math.max(0,round1(demand-capacityHours));
  const otPerPerson=avail>0?round1(shortHours/avail):0;
  const otPerPersonPerDay=avail>0?round1(otPerPerson/horizon):0;
  return {dept,demand:round1(demand),avail,capacityHours:round1(capacityHours),neededHeadcount,shortfall,shortHours,otPerPerson,otPerPersonPerDay,ok:demand<=capacityHours};
}
function costOf(job,work,cfg){
  const c=job.costing||{};
  const mat=sum((c.materials||[]),m=>(Number(m.qty)||0)*(Number(m.cost)||0));
  const emb=Number(c.embroidery)||0,out=Number(c.outsource)||0;
  const rate=(c.labourRate!=null&&c.labourRate!=="")?Number(c.labourRate):(cfg.labourRate||0);
  const hrs=jobLabourHours(job,work);
  const labour=hrs*rate;
  const base=mat+emb+out+labour;
  const ovhPct=(c.overheadPct!=null&&c.overheadPct!=="")?Number(c.overheadPct):(cfg.overheadPct||0);
  const ovh=base*ovhPct/100;
  const total=base+ovh;
  const price=(c.price!=null&&c.price!=="")?Number(c.price):(Number(job.value)||0);
  const margin=price-total;const marginPct=price?margin/price:0;
  return {mat,emb,out,rate,hrs,labour,base,ovhPct,ovh,total,price,margin,marginPct};
}

function scaledItemsFromJob(job,work,cfg){
  const c=costOf(job,work,cfg);
  const parts=[{key:"mat",label:"Fabric & Materials",v:c.mat},{key:"emb",label:"Hand Embroidery & Embellishment",v:c.emb}];
  if(c.out>0)parts.push({key:"out",label:"Outsourced Specialist Work",v:c.out});
  parts.push({key:"tail",label:"Tailoring, Finishing & Quality Assurance",v:c.labour+c.ovh});
  const baseTotal=sum(parts,p=>p.v)||1;
  const target=c.price>0?c.price:c.total;
  const scale=target/baseTotal;
  const items=parts.map(p=>({photo:null,description:p.label,originalPrice:Math.round((p.v*scale)/10)*10,discount:0}));
  const diff=round1(target-sum(items,it=>it.originalPrice));
  if(items.length)items[items.length-1].originalPrice=round1(items[items.length-1].originalPrice+diff);
  return items.filter(it=>it.originalPrice!==0);
}

function daysInMonth(ym){const[y,m]=ym.split("-").map(Number);return new Date(y,m,0).getDate();}
function monthBounds(ym){const dim=daysInMonth(ym);return [`${ym}-01`,`${ym}-${pad(dim)}`];}

function payrollForEmployee(emp,att,ym,cfg,payAdj){
  const dim=daysInMonth(ym);
  const[from,to]=monthBounds(ym);
  const records=att.filter(a=>a.emp===emp.id&&a.date>=from&&a.date<=to);
  const rules={...DEFAULT_PAY_RULES,...(cfg.payRules||{})};
  let payableDays=0,presentDays=0,halfDays=0,absentDays=0,leaveDays=0,medicalDays=0,vacationDays=0,holidayDays=0,otHours=0;
  const seen=new Set();
  records.forEach(a=>{
    seen.add(a.date);
    const mult=rules[a.status]!=null?rules[a.status]:0;
    payableDays+=mult;
    if(a.status==="Present")presentDays++;
    else if(a.status==="Half Day")halfDays++;
    else if(a.status==="Absent")absentDays++;
    else if(a.status==="Leave")leaveDays++;
    else if(a.status==="Medical")medicalDays++;
    else if(a.status==="Vacation")vacationDays++;
    else if(a.status==="Holiday")holidayDays++;
    if((a.status==="Present"||a.status==="Half Day")&&a.in&&a.out){
      const h=hoursBetween(a.in,a.out);
      if(h>(cfg.standardHours||9))otHours+=(h-(cfg.standardHours||9));
    }
  });
  const lastRecordedDay=Math.min(dim,daysBetween(from,to)+1);
  const unmarkedDays=Math.max(0,lastRecordedDay-seen.size);
  const basic=Number(emp.salary)||0;
  const allowances=Number(emp.allowances)||0;
  const gross=basic+allowances;
  const dailyRate=dim>0?gross/dim:0;
  const basicDailyRate=dim>0?basic/dim:0;
  const allowanceDailyRate=dim>0?allowances/dim:0;
  const earnedBasic=round1(basicDailyRate*payableDays);
  const earnedAllowances=round1(allowanceDailyRate*payableDays);
  const earnedGross=round1(earnedBasic+earnedAllowances);
  const otHourlyRate=(cfg.standardHours||9)>0?round1((basicDailyRate/(cfg.standardHours||9))*(cfg.otRate||1.25)):0;
  const otPay=round1(otHours*otHourlyRate);
  const empAdj=(payAdj||[]).filter(x=>x.emp===emp.id&&x.month===ym);
  const additions=round1(sum(empAdj.filter(x=>x.kind==="Addition"),x=>Number(x.amount)||0));
  const deductions=round1(sum(empAdj.filter(x=>x.kind==="Deduction"),x=>Number(x.amount)||0));
  const netPay=round1(earnedGross+otPay+additions-deductions);
  return {emp,ym,dim,payableDays:round1(payableDays),presentDays,halfDays,absentDays,leaveDays,medicalDays,vacationDays,holidayDays,unmarkedDays,otHours:round1(otHours),basic,allowances,gross,dailyRate:round1(dailyRate),otHourlyRate,earnedBasic,earnedAllowances,earnedGross,otPay,additions,deductions,empAdj,netPay};
}

function resizeImage(file,maxDim=1100,quality=0.6){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>h&&w>maxDim){h=h*maxDim/w;w=maxDim;}else if(h>maxDim){w=w*maxDim/h;h=maxDim;}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);res(c.toDataURL("image/jpeg",quality));};img.onerror=rej;img.src=reader.result;};
    reader.onerror=rej;reader.readAsDataURL(file);
  });
}

function SearchPicker({options,value,onChange,placeholder="Search…",disabled}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState("");
  const ref=useRef();
  const selected=options.find(o=>o.id===value);
  useEffect(()=>{
    const onDocClick=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",onDocClick);
    return ()=>document.removeEventListener("mousedown",onDocClick);
  },[]);
  const ql=q.toLowerCase();
  const filtered=q?options.filter(o=>o.label.toLowerCase().includes(ql)||(o.sublabel||"").toLowerCase().includes(ql)):options;
  return (<div className="search-picker" ref={ref}>
    <div className={"sp-display"+(disabled?" disabled":"")} onClick={()=>{if(disabled)return;setOpen(o=>!o);setQ("");}}>
      {selected?<span>{selected.label}{selected.sublabel?<span className="faint" style={{marginLeft:6,fontSize:11}}>· {selected.sublabel}</span>:null}</span>:<span className="faint">{placeholder}</span>}
      <Ico d={icons.chev} size={13}/>
    </div>
    {open&&<div className="sp-pop">
      <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder={"Type to search…"} onClick={e=>e.stopPropagation()}/>
      <div className="sp-list">
        {filtered.length===0&&<div className="sp-empty">No matches</div>}
        {filtered.map(o=>(<div key={o.id} className={"sp-item"+(o.id===value?" sel":"")} onClick={()=>{onChange(o.id);setOpen(false);setQ("");}}>
          {o.label}{o.sublabel?<span className="faint" style={{marginLeft:6,fontSize:11}}>· {o.sublabel}</span>:null}
        </div>))}
      </div>
    </div>}
  </div>);
}
function LoginGate({employees,cfg,onLogin}){
  const operators=employees.filter(e=>e.active&&e.pin&&e.role&&STAFF_ROLES.includes(e.role));
  const [picked,setPicked]=useState(null); // {kind:"owner"}|{kind:"operator",emp}
  const [pin,setPin]=useState("");
  const [err,setErr]=useState("");
  const tryLogin=()=>{
    if(picked.kind==="owner"){
      if(!cfg.ownerPin||pin===cfg.ownerPin){onLogin({role:"Owner",empId:""});return;}
      setErr("Incorrect PIN.");setPin("");return;
    }
    if(pin===picked.emp.pin){onLogin({role:picked.emp.role,empId:picked.emp.id});return;}
    setErr("Incorrect PIN.");setPin("");
  };
  return (<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--canvas)",padding:20}}>
    <div style={{width:380,background:"var(--paper)",border:"1px solid var(--line)",borderRadius:10,padding:"32px 28px",boxShadow:"0 24px 60px -16px rgba(0,0,0,.25)"}}>
      <div style={{textAlign:"center",marginBottom:22}}>
        <img src={LOGO_MARK} alt="" style={{width:46,height:46,margin:"0 auto 10px",display:"block"}}/>
        <h2 className="serif" style={{fontSize:22,margin:0}}>{cfg.house||"Dina Melwani Couture"}</h2>
        <p className="faint" style={{fontSize:12,margin:"4px 0 0"}}>Who's working?</p>
      </div>
      {!picked&&<div>
        <button className="btn" style={{width:"100%",marginBottom:10}} onClick={()=>{setPicked({kind:"owner"});setErr("");}}>Owner / Admin</button>
        {operators.length>0&&<>
          <div className="faint" style={{fontSize:10.5,letterSpacing:".14em",textTransform:"uppercase",margin:"16px 0 8px"}}>Staff</div>
          {operators.map(e=><button key={e.id} className="btn ghost" style={{width:"100%",marginBottom:8,justifyContent:"flex-start"}} onClick={()=>{setPicked({kind:"operator",emp:e});setErr("");}}>{e.name} <span className="faint" style={{marginLeft:6,fontSize:11}}>· {e.role}</span></button>)}
        </>}
      </div>}
      {picked&&<div>
        <p style={{fontSize:13,marginBottom:10}}>{picked.kind==="owner"?"Owner / Admin":picked.emp.name}{picked.kind==="owner"&&!cfg.ownerPin?" — no PIN set, continue below.":""}</p>
        {(picked.kind!=="owner"||cfg.ownerPin)&&<input autoFocus className="mono" type="password" inputMode="numeric" placeholder="PIN" value={pin} onChange={e=>{setPin(e.target.value.replace(/\D/g,"").slice(0,8));setErr("");}} onKeyDown={e=>{if(e.key==="Enter")tryLogin();}} style={{width:"100%",padding:"10px 12px",fontSize:16,textAlign:"center",letterSpacing:"4px",border:"1px solid var(--line)",borderRadius:6,marginBottom:10}}/>}
        {err&&<p style={{color:"var(--absent)",fontSize:12,marginBottom:10}}>{err}</p>}
        <div style={{display:"flex",gap:8}}>
          <button className="btn ghost" style={{flex:1}} onClick={()=>{setPicked(null);setPin("");setErr("");}}>Back</button>
          <button className="btn" style={{flex:1}} onClick={tryLogin}>Continue</button>
        </div>
      </div>}
    </div>
  </div>);
}

function buildBackupPayload(s){

  const sheets={
    Employees:{headers:["ID","Name","Designation","Department","Engagement","Mobile","Status"],rows:s.employees.map(e=>[e.id,e.name,e.designation,e.dept,e.engagement||"",e.mobile,e.active?"Active":"Inactive"])},
    Attendance:{headers:["Date","Employee","Status","In","Out","Hours","Remarks"],rows:s.att.map(a=>[a.date,nameOf(a.emp),a.status,a.in,a.out,hoursBetween(a.in,a.out),a.remarks])},
    Jobs:{headers:["Job","Stream","Client","Project","Product","Delivery","Stage","Sizing","Value"],rows:s.jobs.map(j=>[j.id,j.stream,j.client,j.project,j.productType,j.delivery,j.stage,j.sizing&&j.sizing.custom?"Custom":sizeUnits(j)+" units",j.value])},
    Work:{headers:["Date","Employee","Job","Task","Start","End","Hours","Completed"],rows:s.work.map(w=>[w.date,nameOf(w.emp),w.job,w.task,w.start,w.end,hoursBetween(w.start,w.end),w.done])},
    Appointments:{headers:["Date","Time","Type","Client","Job","Status","Notes"],rows:(s.appts||[]).map(a=>[a.date,a.time,a.type,a.client,a.job,a.status,a.notes])},
    Costing:{headers:["Job","Stream","Price","Total cost","Margin","Margin %"],rows:s.jobs.map(j=>{const c=costOf(j,s.work,s.cfg);return[j.id,j.stream,c.price,round1(c.total),round1(c.margin),(c.marginPct*100).toFixed(1)+"%"];})},
    Schedule:{headers:["Job","Stage","Target date","Assignee","Done"],rows:s.jobs.flatMap(j=>(j.schedule||[]).map(x=>[j.id,x.stage,x.date,x.assignee,x.done?"Yes":"No"]))},
    Quotations:{headers:["Quote No","Date","Status","Client","Job","Project","Subtotal","VAT","Total","Reference sheet"],rows:(s.quotes||[]).map(q=>{const t=quoteTotals(q);return[q.id,q.date,q.status,q.client,q.job,q.project,t.subtotal,t.vatAmt,t.total,q.refSheetUrl||""];})},
    PayrollAdjustments:{headers:["Month","Employee","Kind","Reason","Amount","Note"],rows:(s.payAdj||[]).map(a=>[a.month,nameOf(a.emp),a.kind,a.reason,a.amount,a.note||""])},
    Customers:{headers:["ID","Name","Phone","Email","VIP","Source","Active"],rows:(s.customers||[]).map(c=>[c.id,c.name,c.phone,c.email,c.vip?"Yes":"No",c.source,c.active?"Active":"Inactive"])},
    Shows:{headers:["ID","Name","Season","City","Date","Status"],rows:(s.shows||[]).map(sh=>[sh.id,sh.name,sh.season,sh.city,sh.date,sh.status])},
    Inventory:{headers:["ID","Name","Category","Unit","Qty on hand","Reorder level","Cost/unit","Supplier"],rows:(s.inventory||[]).map(i=>[i.id,i.name,i.category,i.unit,i.qtyOnHand,i.reorderLevel,i.costPerUnit,i.supplier])},
    Tasks:{headers:["Title","Assignee","Job","Due date","Priority","Status"],rows:(s.tasks||[]).map(t=>[t.title,nameOf(t.assignee),t.job,t.dueDate,t.priority,t.status])},
  };
  return {house:s.cfg.house,at:new Date().toISOString(),sheets};

function useDayAnalytics({employees,att,jobs,work,appts,cfg,workDate}){
  return useMemo(()=>{
    const active=employees.filter(e=>e.active);
    const dayAtt=att.filter(a=>a.date===workDate);
    const attMap=Object.fromEntries(dayAtt.map(a=>[a.emp,a]));
    const present=dayAtt.filter(a=>a.status==="Present");
    const half=dayAtt.filter(a=>a.status==="Half Day");
    const absent=dayAtt.filter(a=>a.status==="Absent");
    const onLeave=dayAtt.filter(a=>["Leave","Vacation","Medical"].includes(a.status));
    const holiday=dayAtt.filter(a=>a.status==="Holiday");
    const marked=new Set(dayAtt.map(a=>a.emp));
    const unmarked=active.filter(e=>!marked.has(e.id));
    const lateList=dayAtt.filter(a=>a.in&&t2m(a.in)>t2m(cfg.shiftStart)+5).map(a=>({...a,late:t2m(a.in)-t2m(cfg.shiftStart)}));
    const dayWork=work.filter(w=>w.date===workDate);
    const totalWorkHours=round1(sum(dayWork,w=>hoursBetween(w.start,w.end)));
    const jobsWorked=[...new Set(dayWork.map(w=>w.job))];
    let otTotal=0;present.concat(half).forEach(a=>{const h=hoursBetween(a.in,a.out);if(h>cfg.standardHours)otTotal+=h-cfg.standardHours;});
    const jobHoursToday={};dayWork.forEach(w=>{jobHoursToday[w.job]=(jobHoursToday[w.job]||0)+hoursBetween(w.start,w.end);});
    const topJob=Object.entries(jobHoursToday).sort((a,b)=>b[1]-a[1])[0];
    const openJobs=jobs.filter(j=>j.stage!==lastStage(j.stream));
    const urgent=openJobs.filter(j=>{const d=daysBetween(workDate,j.delivery);return d>=0&&d<=5;}).sort((a,b)=>daysBetween(workDate,a.delivery)-daysBetween(workDate,b.delivery));
    const delayed=openJobs.filter(j=>daysBetween(workDate,j.delivery)<0).sort((a,b)=>daysBetween(workDate,a.delivery)-daysBetween(workDate,b.delivery));
    const scheduledToday=[],behind=[];
    openJobs.forEach(j=>(j.schedule||[]).forEach(s=>{if(s.done||!s.date)return;if(s.date===workDate)scheduledToday.push({job:j.id,stage:s.stage,assignee:s.assignee});else if(s.date<workDate)behind.push({job:j.id,stage:s.stage,date:s.date});}));
    const apptsToday=(appts||[]).filter(a=>a.date===workDate&&a.status!=="Cancelled").sort((a,b)=>(a.time||"").localeCompare(b.time||""));
    return {active,dayAtt,attMap,present,half,absent,onLeave,holiday,unmarked,lateList,dayWork,totalWorkHours,jobsWorked,otTotal:round1(otTotal),jobHoursToday,topJob,urgent,delayed,openJobs,scheduledToday,behind,apptsToday};
  },[employees,att,jobs,work,appts,cfg,workDate]);
}
function buildBrief(a,workDate,empById,jobById){
  const s=[];
  s.push(`Today ${a.present.length} ${a.present.length===1?"artisan was":"artisans were"} present${a.half.length?`, ${a.half.length} on half-day`:""}, ${a.absent.length} absent${a.onLeave.length?` and ${a.onLeave.length} on leave or vacation`:""}.`);
  s.push(a.jobsWorked.length?`${a.jobsWorked.length} ${a.jobsWorked.length===1?"order was":"orders were"} worked on, totalling ${a.totalWorkHours} recorded atelier hours.`:`No work was logged against any order today.`);
  if(a.topJob){const j=jobById[a.topJob[0]];s.push(`${a.topJob[0]}${j?` — ${j.project}`:""} drew the most attention at ${round1(a.topJob[1])} hours.`);}
  if(a.apptsToday.length)s.push(`${a.apptsToday.length} client ${a.apptsToday.length===1?"appointment is":"appointments are"} booked today: ${a.apptsToday.slice(0,3).map(x=>x.type.split(" /")[0]+" with "+x.client+" at "+x.time).join("; ")}.`);
  if(a.scheduledToday.length)s.push(`${a.scheduledToday.length} production ${a.scheduledToday.length===1?"stage is":"stages are"} scheduled to complete today.`);
  const flags=[];
  a.delayed.forEach(j=>flags.push({type:"Overdue",text:<><b>{j.id}</b> ({j.project}) passed its delivery date on {fmtDate(j.delivery)} and remains at the <b>{j.stage}</b> stage.</>}));
  a.behind.slice(0,4).forEach(x=>flags.push({type:"Behind schedule",text:<><b>{x.job}</b> — the <b>{x.stage}</b> stage was planned for {fmtDate(x.date)} and is not yet complete.</>}));
  a.openJobs.forEach(j=>{const d=daysBetween(workDate,j.delivery);const path=pathFor(j.stream);const rem=path.length-1-path.indexOf(j.stage);if(d>=0&&d<=4&&rem>=4)flags.push({type:"At risk",text:<><b>{j.id}</b> is due in {d} {d===1?"day":"days"} but only at <b>{j.stage}</b> — {rem} stages remain.</>});});
  if(a.lateList.length)flags.push({type:"Punctuality",text:<>{a.lateList.length} {a.lateList.length===1?"artisan arrived":"artisans arrived"} late: {a.lateList.slice(0,6).map(l=>{const e=empById[l.emp];return (e?e.name:l.emp)+` (+${l.late}m)`;}).join(", ")}.</>});
  if(a.otTotal>0)flags.push({type:"Overtime",text:<>{round1(a.otTotal)} overtime hours accrued today.</>});
  return {sentences:s,flags};
}

            <div style={{minWidth:180,flex:"1 1 240px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><b className="mono" style={{fontSize:14}}>{j.id}</b><span className={"pill "+STREAM_CLASS[j.stream]}>{STREAM_SHORT[j.stream]}</span><span className="pill neutral">{j.productType}</span><span className={status==="Work in Progress"?"pill gold":"pill present"}><span className="dot" style={{background:status==="Work in Progress"?"var(--gold)":"var(--present)"}}/>{status}</span></div>
              <div className="serif" style={{fontSize:17,marginTop:4}}>{j.project}</div>
              <div className="muted" style={{fontSize:12.5,marginTop:2}}>{j.client}</div>
              <div className="faint" style={{fontSize:11.5,marginTop:6}}>{j.sizing&&j.sizing.custom?"Custom measurements":`Standard · ${units} unit${units===1?"":"s"} (${Object.entries(j.sizing.sizes||{}).filter(([,v])=>v).map(([k,v])=>k.replace("IT ","")+"×"+v).join(" ")||"—"})`}</div>
              {!(j.sizing&&j.sizing.custom)&&units>0&&<div style={{marginTop:7,maxWidth:220}}>
                <div className="bar-track" style={{height:6}}><div className="bar-fill" style={{width:Math.min(100,(sizeCompleted(j)/units)*100)+"%"}}/></div>
                <div className="faint" style={{fontSize:10.5,marginTop:3}}>{sizeCompleted(j)} of {units} ready{sizeProvisional(j)>0?` · +${sizeProvisional(j)} provisional`:""}</div>
              </div>}
            </div>
            <div style={{textAlign:"right",minWidth:130}}>
              <div className={d<0?"pill absent":d<=3?"pill gold":"pill neutral"} style={{marginBottom:6}}>{d<0?`${Math.abs(d)}d overdue`:d===0?"Due today":`${d}d to deliver`}</div>
              <div className="mono faint" style={{fontSize:11}}>{fmtDate(j.delivery)}</div>
              {j.value>0&&<div className="mono" style={{fontSize:12,marginTop:6}}>{aed(co.price)} · <span style={{color:co.marginPct<0.2?"var(--absent)":"var(--present)"}}>{(co.marginPct*100).toFixed(0)}% mgn</span></div>}
              <div style={{marginTop:4}}><span className={"pill "+(j.pay==="Paid"?"present":j.pay==="Unpaid"?"absent":"gold")}>{j.pay}</span></div>
            </div>
          </div>
          <div style={{padding:"4px 20px 16px"}}><div className="progress-line">{path.map((s,i)=>(<div key={s} className={"step"+(i<idx?" done":i===idx?" current":"")}>{i>0&&<span className="line"/>}<span className="ring">{i<idx?"✓":i+1}</span><span className="lbl">{s}</span></div>))}</div></div>
          <div style={{padding:"10px 20px",borderTop:"1px solid var(--line-soft)",display:"flex",gap:10,alignItems:"center"}}>
            <label className="faint" style={{fontSize:10.5,letterSpacing:".14em",textTransform:"uppercase"}}>Advance stage</label>
            <select value={j.stage} onChange={e=>save({...j,stage:e.target.value,status:e.target.value===lastStage(j.stream)?"Delivered":j.status})} style={tinput}>{path.map(s=><option key={s}>{s}</option>)}</select>
            <div style={{flex:1}}/><button className="icon-btn" onClick={()=>setEditing({...j,value:String(j.value)})}>Open order</button>
          </div>
        </div>);})}
      {list.length===0&&<div className="empty"><div className="e-mark serif">∅</div><p>No orders in this stream yet.</p></div>}
    </div>
    {editing&&<JobDrawer job={editing} cfg={cfg} work={work} customers={customers} saveCustomers={saveCustomers} shows={shows} inventory={inventory} onClose={()=>setEditing(null)} onSave={save} onRemove={id=>{if(confirm("Delete this order?")){saveJobs(jobs.filter(x=>x.id!==id));setEditing(null);}}} photos={photos[editing.id]||[]} addPhoto={p=>addPhoto(editing.id,p)} removePhoto={pid=>removePhoto(editing.id,pid)} captionPhoto={(pid,c)=>captionPhoto(editing.id,pid,c)} onView={setLightbox} onPrintJobSheet={setPrintJobSheet}/>}
    {lightbox&&<div className="lightbox" onClick={()=>setLightbox(null)}><button className="lb-x" onClick={()=>setLightbox(null)}>×</button><img src={lightbox} alt=""/></div>}
  </div>);
}

  const setCost=(k,v)=>setF(p=>({...p,costing:{...p.costing,[k]:v}}));
  const setMat=(i,k,v)=>setF(p=>{const m=[...(p.costing.materials||[])];m[i]={...m[i],[k]:v};return{...p,costing:{...p.costing,materials:m}};});

  const co=costOf(f,work,cfg);const std=isStandard(f.stream);

  return (<div className="scrim" onClick={onClose}><div className="drawer" onClick={e=>e.stopPropagation()}>

    <div className="drawer-b">

  </div></div>);

      <div className="card-h"><Ico d={icons.cal} size={15}/><h3>Atelier Timeline</h3><span className="count">{open.length} open · next {horizon} days from {fmtShort(workDate)}</span></div>

            {byDate[date].map((t,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",fontSize:12.5}}><span><b className="mono">{t.job}</b> · {t.stage}</span><span className="faint">{t.assignee} · {deptHeadcount(employees,t.assignee)} active</span></div>))}

        </div>

      <div className="card-h"><Ico d={icons.gauge} size={15}/><h3>Team Capacity Check</h3><span className="count">next {horizon} days · {cfg.standardHours||9}h/day per artisan</span></div>

        {capacityRows.length>0&&<div className="tbl-wrap"><table className="tbl">

            <td>{r.shortfall>0?<span className="pill gold">+{r.otPerPerson}h/person ({r.otPerPersonPerDay}h/day)</span>:<span className="faint" style={{fontSize:11}}>not needed</span>}</td>

        {anyShort&&<div className="note" style={{marginTop:14}}><Ico d={icons.warn} size={15}/><span>One or more departments are short for the work estimated in this window. Either bring in additional hands (Option A), absorb the gap as overtime across the existing team (Option B), or extend the stage dates.</span></div>}

      <div className="card-h"><Ico d={icons.pen} size={15}/><h3>Plan an Order</h3>
        <select value={planId} onChange={e=>setPlanId(e.target.value)} style={{...tinput,marginLeft:"auto"}}><option value="">Select order…</option>{open.map(j=><option key={j.id} value={j.id}>{j.id} · {j.project}</option>)}</select></div>
      {plan&&<Planner key={plan.id} job={plan} workDate={workDate} employees={employees} cfg={cfg} onSave={sj=>saveJobs(jobs.map(x=>x.id===sj.id?sj:x))}/>}
      {!plan&&<div className="card-b"><p className="muted">Choose an order to adjust its stage-by-stage plan, assign teams, estimate hours, and mark stages complete.</p></div>}
    </div>
  </div>);
}
function Planner({job,workDate,employees,cfg,onSave}){
  const [sched,setSched]=useState(job.schedule&&job.schedule.length?job.schedule:autoSchedule(job,workDate));
  const upd=(i,patch)=>setSched(s=>s.map((x,idx)=>idx===i?{...x,...patch}:x));
  const regen=()=>setSched(autoSchedule(job,workDate));
  const commit=()=>{const firstOpen=sched.find(s=>!s.done);const stage=firstOpen?firstOpen.stage:lastStage(job.stream);onSave({...job,schedule:sched,stage,status:stage===lastStage(job.stream)?"Delivered":job.status});};
  const planEnd=sched.filter(s=>s.date).map(s=>s.date).sort().slice(-1)[0]||job.delivery;
  const fits=daysBetween(planEnd,job.delivery)>=0;
  return (<div>
    <div style={{padding:"12px 18px",display:"flex",gap:14,alignItems:"center",flexWrap:"wrap",borderBottom:"1px solid var(--line-soft)"}}>
      <span className="faint" style={{fontSize:12}}>Delivery <b className="mono" style={{color:"var(--ink)"}}>{fmtDate(job.delivery)}</b></span>
      <span className={fits?"pill present":"pill absent"}>{fits?"Plan fits delivery":`Plan ends ${Math.abs(daysBetween(job.delivery,planEnd))}d past delivery`}</span>
      <div style={{flex:1}}/>
      <button className="btn ghost sm" onClick={regen}>Auto-schedule (backward)</button>
      <button className="btn wine sm" onClick={commit}>Save plan</button>
    </div>
    <div className="tbl-wrap"><table className="tbl">
      <thead><tr><th>#</th><th>Stage</th><th>Target date</th><th>Assignee</th><th className="num">Est. hours</th><th>Capacity</th><th>Done</th></tr></thead>
      <tbody>{sched.map((s,i)=>{const prevDate=i===0?workDate:(sched[i-1].date||workDate);const cap=stageCapacityCheck(s,prevDate,employees,cfg);return(<tr key={i} style={s.done?{opacity:.6}:null}>
        <td className="mono faint">{i+1}</td><td><b>{s.stage}</b></td>
        <td>{i===sched.length-1?<span className="mono">{fmtDate(s.date)}</span>:<input type="date" className="mono" value={s.date||""} onChange={e=>upd(i,{date:e.target.value})} style={tinput}/>}</td>
        <td><select value={s.assignee||""} onChange={e=>upd(i,{assignee:e.target.value})} style={tinput}>{DEPARTMENTS.map(d=><option key={d}>{d}</option>)}</select></td>
        <td><input className="mono" type="number" min="0" value={s.estHours||""} placeholder="0" onChange={e=>upd(i,{estHours:Number(e.target.value)||0})} style={{...tinput,width:64,textAlign:"right"}}/></td>
        <td>{s.done||!cap.needHours?<span className="faint" style={{fontSize:11}}>—</span>:cap.shortfall>0?<span className="pill absent" title={`${cap.avail} active in ${s.assignee}, need ~${cap.neededHeadcount} — or +${cap.otPerPerson}h OT per person`}>Short by {cap.shortfall} · or +{cap.otPerPerson}h OT</span>:<span className="pill present" title={`${cap.avail} active in ${s.assignee}`}>OK · {cap.avail}</span>}</td>
        <td><input type="checkbox" checked={!!s.done} onChange={e=>upd(i,{done:e.target.checked})}/></td>
      </tr>);})}</tbody>
    </table></div>
    <div className="note" style={{margin:16}}><Ico d={icons.cal} size={15}/><span><b>Manual:</b> edit any target date or assignee directly — your changes hold until you click Auto-schedule again. <b>Automatic:</b> "Auto-schedule (backward)" recalculates all dates evenly between today and delivery. Add an hours estimate per stage to see whether the assigned department has enough active staff to meet that date.</span></div>
  </div>);
}

      <tbody>

          <td className="mono nowrap">{j.id}</td><td><span className={"pill "+STREAM_CLASS[j.stream]} style={{fontSize:10}}>{STREAM_SHORT[j.stream]}</span></td>

function WorkEntry({employees,jobs,work,saveWork,workDate,empById,jobById,session}){

function JobHours({work,jobById,empById}){

  const byTask=useMemo(()=>{const m={};filtered.forEach(w=>{m[w.task]=(m[w.task]||0)+hoursBetween(w.start,w.end);});return Object.entries(m).map(([k,v])=>({k,v:round1(v)})).sort((a,b)=>b.v-a.v);},[filtered]);
  const byJobArtisan=useMemo(()=>{const m={};filtered.forEach(w=>{const h=hoursBetween(w.start,w.end);if(!m[w.job])m[w.job]={};if(!m[w.job][w.emp])m[w.job][w.emp]={hours:0,tasks:{}};m[w.job][w.emp].hours+=h;m[w.job][w.emp].tasks[w.task]=(m[w.job][w.emp].tasks[w.task]||0)+h;});return m;},[filtered]);

      {range==="range"&&<><input className="field-date mono" type="date" value={from} onChange={e=>setFrom(e.target.value)}/><span className="faint">→</span><input className="field-date mono" type="date" value={to} onChange={e=>setTo(e.target.value)}/></>}
      <div style={{flex:1}}/>{pendingExcluded>0&&<span className="pill gold" style={{marginRight:10}}>{pendingExcluded} entr{pendingExcluded===1?"y":"ies"} awaiting approval — excluded</span>}<span className="muted" style={{fontSize:12.5}}>Total · <b className="mono">{totalHrs}h</b> across {byJob.length} orders</span></div>

function MonthlyReport({jobs,work,employees,empById,cfg,workDate}){

function CalendarView({appts,jobs,shows,tasks,workDate}){
  const [ym,setYm]=useState(currentMonth(workDate));
  const [selDate,setSelDate]=useState(workDate);
  const [y,m]=ym.split("-").map(Number);
  const firstDow=new Date(y,m-1,1).getDay();
  const dim=daysInMonth(ym);
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=dim;d++)cells.push(d);
  const typeColor={appt:"var(--leave)",delivery:"var(--absent)",stage:"var(--gold)",show:"var(--oxblood)",task:"var(--present)"};
  const typeLabel={appt:"Appointment",delivery:"Delivery",stage:"Stage target",show:"Show date",task:"Task"};
  const eventsByDate=useMemo(()=>{
    const map={};
    const add=(date,label,type)=>{if(!date)return;(map[date]=map[date]||[]).push({label,type});};
    (appts||[]).forEach(a=>{if(a.status!=="Cancelled")add(a.date,`${a.type.split(" /")[0]} — ${a.client}`,"appt");});
    (jobs||[]).forEach(j=>{
      add(j.delivery,`${j.id} delivery — ${j.project}`,"delivery");
      (j.schedule||[]).forEach(s=>{if(!s.done&&s.date)add(s.date,`${j.id} · ${s.stage}`,"stage");});
    });
    (shows||[]).forEach(s=>add(s.date,`${s.name} (${s.season})`,"show"));
    (tasks||[]).forEach(t=>{if(t.status!=="Done")add(t.dueDate,`Task: ${t.title}`,"task");});
    return map;
  },[appts,jobs,shows,tasks]);
  const monthName=monthLabel(ym);
  const dayEvents=eventsByDate[selDate]||[];
  const prevMonth=()=>{const d=new Date(y,m-2,1);setYm(`${d.getFullYear()}-${pad(d.getMonth()+1)}`);};
  const nextMonth=()=>{const d=new Date(y,m,1);setYm(`${d.getFullYear()}-${pad(d.getMonth()+1)}`);};
  return (<div className="view">
    <div className="page-head"><div><div className="eyebrow">Operations</div><h2>Calendar</h2><p className="lede">Every date in one place — client appointments, production stage targets, deliveries, show dates and task deadlines.</p></div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <button className="icon-btn" onClick={prevMonth}>←</button>
        <div className="serif" style={{minWidth:150,textAlign:"center"}}>{monthName}</div>
        <button className="icon-btn" onClick={nextMonth}>→</button>
      </div></div>
    <div style={{display:"flex",gap:14,marginBottom:14,flexWrap:"wrap"}}>
      {Object.entries(typeColor).map(([k,c])=>(<span key={k} style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11.5,color:"var(--ink-soft)"}}><span style={{width:7,height:7,borderRadius:"50%",background:c,display:"inline-block"}}/>{typeLabel[k]}</span>))}
    </div>
    <div className="card">
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:"1px solid var(--line)"}}>
        {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>(<div key={d} className="faint" style={{padding:"8px 6px",fontSize:10,letterSpacing:".1em",textTransform:"uppercase",textAlign:"center"}}>{d}</div>))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
        {cells.map((d,i)=>{
          if(!d)return <div key={i} style={{minHeight:80,borderRight:"1px solid var(--line-soft)",borderBottom:"1px solid var(--line-soft)",background:"var(--paper-2)"}}/>;
          const dateStr=`${ym}-${pad(d)}`;
          const evs=eventsByDate[dateStr]||[];
          const isToday=dateStr===workDate;
          const isSel=dateStr===selDate;
          return (<div key={i} onClick={()=>setSelDate(dateStr)} style={{minHeight:80,padding:"6px 7px",borderRight:"1px solid var(--line-soft)",borderBottom:"1px solid var(--line-soft)",cursor:"pointer",background:isSel?"rgba(174,138,78,.08)":"#fff"}}>
            <div className="mono" style={{fontSize:11,color:isToday?"var(--oxblood)":"var(--ink-soft)",fontWeight:isToday?700:400}}>{d}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:5}}>{evs.slice(0,5).map((e,ei)=>(<span key={ei} style={{width:6,height:6,borderRadius:"50%",background:typeColor[e.type]}}/>))}{evs.length>5&&<span className="faint" style={{fontSize:9}}>+{evs.length-5}</span>}</div>

/* ============== Customers ============== */
function Customers(props){
  const {customers,saveCustomers,jobs,quotes,appts,work,cfg}=props;
  const [q,setQ]=useState("");
  const [editing,setEditing]=useState(null);
  const [viewing,setViewing]=useState(null);
  const blank={id:"",name:"",phone:"",email:"",address:"",vip:false,source:"Walk-in",measurements:{bust:"",waist:"",hip:"",height:"",sleeve:"",shoulder:"",inseam:"",notes:""},notesLog:[],refPhotos:[],createdDate:todayISO(),active:true};
  const list=customers.filter(c=>!q||c.name.toLowerCase().includes(q.toLowerCase()));
  const save=c=>{let next;if(c.id&&customers.some(x=>x.id===c.id))next=customers.map(x=>x.id===c.id?c:x);else next=[...customers,{...c,id:c.id||uid("CUS")}];saveCustomers(next);setEditing(null);};
  const remove=id=>{if(confirm("Remove this customer record? Existing orders keep the name on file but lose the link.")){saveCustomers(customers.filter(x=>x.id!==id));setEditing(null);if(viewing===id)setViewing(null);}};
  if(viewing){
    const cust=customers.find(c=>c.id===viewing);
    if(!cust)return null;
    return (<>
      <CustomerProfile {...props} customer={cust} onBack={()=>setViewing(null)} onEdit={()=>setEditing({...cust})}/>

    </>);

  return (<div className="view">
    <div className="page-head"><div><div className="eyebrow">Customers</div><h2>Customer Directory</h2><p className="lede">Every client relationship in one place — orders, measurements, payments, fittings and notes, all linked.</p></div>
      <button className="btn wine" onClick={()=>setEditing({...blank})}><Ico d={icons.plus} size={14}/>Add customer</button></div>
    <div className="toolbar"><div className="search"><Ico d={icons.search} size={15}/><input placeholder="Search customers…" value={q} onChange={e=>setQ(e.target.value)}/></div></div>
    <div className="grid" style={{gap:12}}>
      {list.length===0&&<div className="empty"><div className="e-mark serif">∅</div><p>No customers match.</p></div>}
      {list.map(c=>{
        const orders=customerOrders(c.id,jobs);
        const open=orders.filter(j=>j.stage!==lastStage(j.stream));
        const outstanding=customerOutstanding(c.id,jobs,work,cfg);
        return (<div className="card" key={c.id} style={{cursor:"pointer"}} onClick={()=>setViewing(c.id)}>
          <div style={{padding:"16px 20px",display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
            <div className="monogram serif" style={{width:44,height:44,borderColor:"var(--gold)",color:"var(--oxblood)",flexShrink:0}}>{(c.name||"?").slice(0,1)}</div>
            <div style={{flex:1,minWidth:160}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><b className="serif" style={{fontSize:16}}>{c.name}</b>{c.vip&&<span className="pill gold">VIP</span>}{!c.active&&<span className="pill neutral">Inactive</span>}</div>
              <div className="faint" style={{fontSize:11.5,marginTop:3}}>{c.source}{c.phone?" · "+c.phone:""}{c.email?" · "+c.email:""}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div className="mono" style={{fontSize:13}}>{orders.length} order{orders.length===1?"":"s"} · {open.length} active</div>
              {outstanding>0&&<div className="pill absent" style={{marginTop:4}}>{aed(outstanding)} outstanding</div>}
            </div>
          </div>

  </div></div>);
}

/* ============== Team Tasks ============== */
function Tasks({tasks,saveTasks,employees,jobs,workDate}){
  const [editing,setEditing]=useState(null);
  const [filter,setFilter]=useState("open");
  const [q,setQ]=useState("");
  const active=employees.filter(e=>e.active);
  const blank={id:"",title:"",assignee:active[0]?active[0].id:"",job:"",dueDate:workDate,priority:"Normal",status:"To Do",notes:""};
  const list=tasks.filter(t=>(filter==="open"?t.status!=="Done":filter==="done"?t.status==="Done":true)&&(!q||t.title.toLowerCase().includes(q.toLowerCase()))).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const save=t=>{let next;if(t.id&&tasks.some(x=>x.id===t.id))next=tasks.map(x=>x.id===t.id?t:x);else next=[...tasks,{...t,id:uid("TSK")}];saveTasks(next);setEditing(null);};
  const remove=id=>{if(confirm("Delete this task?")){saveTasks(tasks.filter(x=>x.id!==id));setEditing(null);}};
  const setStatus=(id,status)=>saveTasks(tasks.map(t=>t.id===id?{...t,status}:t));
  const empById=Object.fromEntries(employees.map(e=>[e.id,e]));
  const prColor={Urgent:"absent",High:"gold",Normal:"neutral",Low:"neutral"};
  return (<div className="view">
    <div className="page-head"><div><div className="eyebrow">Planning</div><h2>Team Tasks</h2><p className="lede">Internal coordination — purchasing follow-ups, cutting instructions, anything that needs a name and a date, separate from client appointments and production stages.</p></div>
      <button className="btn wine" onClick={()=>setEditing({...blank})}><Ico d={icons.plus} size={14}/>New task</button></div>
    <div className="toolbar"><div className="search"><Ico d={icons.search} size={15}/><input placeholder="Search tasks…" value={q} onChange={e=>setQ(e.target.value)}/></div>
      <div className="seg">{[["open","Open"],["done","Done"],["all","All"]].map(([f,l])=><button key={f} className={filter===f?"on":""} onClick={()=>setFilter(f)}>{l}</button>)}</div></div>
    <div className="card"><div className="tbl-wrap"><table className="tbl">
      <thead><tr><th>Task</th><th>Assignee</th><th>Linked order</th><th>Due</th><th>Priority</th><th>Status</th><th></th></tr></thead>
      <tbody>
        {list.length===0&&<tr><td colSpan="7"><div className="empty"><div className="e-mark serif">∅</div><p>No tasks match this view.</p></div></td></tr>}
        {list.map(t=>{const e=empById[t.assignee];const overdue=t.status!=="Done"&&t.dueDate<workDate;return(<tr key={t.id} style={t.status==="Done"?{opacity:.55}:null}>
          <td>{t.title}{t.notes&&<div className="faint" style={{fontSize:10.5}}>{t.notes}</div>}</td>
          <td>{e?e.name:"—"}</td>
          <td className="mono faint">{t.job||"—"}</td>
          <td className="nowrap"><span className={overdue?"pill absent":"mono"}>{fmtShort(t.dueDate)}</span></td>
          <td><span className={"pill "+prColor[t.priority]}>{t.priority}</span></td>
          <td><select value={t.status} onChange={e2=>setStatus(t.id,e2.target.value)} style={tinput}>{TASK_STATUS.map(s=><option key={s}>{s}</option>)}</select></td>
          <td><button className="icon-btn" onClick={()=>setEditing({...t})}>Edit</button></td>
        </tr>);})}
      </tbody>
    </table></div></div>
    {editing&&<TaskDrawer task={editing} employees={active} jobs={jobs} onClose={()=>setEditing(null)} onSave={save} onRemove={remove}/>}
  </div>);
}

function fuzzyFind(list,query,getName,getId){
  if(!query) return {match:null,candidates:[]};
  const q=String(query).toLowerCase().trim();
  const exact=list.find(x=>String(getId(x)||"").toLowerCase()===q || String(getName(x)||"").toLowerCase()===q);
  if(exact) return {match:exact,candidates:[]};
  const partial=list.filter(x=>String(getName(x)||"").toLowerCase().includes(q)||String(getId(x)||"").toLowerCase().includes(q));
  if(partial.length===1) return {match:partial[0],candidates:[]};
  if(partial.length>1) return {match:null,candidates:partial};
  return {match:null,candidates:[]};
}
const findCustomerFz=(customers,q)=>fuzzyFind(customers||[],q,c=>c.name,c=>c.id);
const findJobFz=(jobs,q)=>fuzzyFind(jobs||[],q,j=>j.project+" "+j.client,j=>j.id);
const findEmployeeFz=(employees,q)=>fuzzyFind((employees||[]).filter(e=>e.active),q,e=>e.name,e=>e.id);
const findTaskFz=(tasks,q)=>fuzzyFind(tasks||[],q,t=>t.title,t=>t.id);
const findInvFz=(inventory,q)=>fuzzyFind(inventory||[],q,i=>i.name,i=>i.id);

function buildAISnapshot(props){
  const {employees,customers,jobs,work,appts,quotes,tasks,inventory,cfg,workDate}=props;
  const custSummary=(customers||[]).map(c=>({
    id:c.id,name:c.name,vip:c.vip,source:c.source,phone:c.phone,active:c.active,
    orders:customerOrders(c.id,jobs).map(j=>j.id),
    outstandingAED:customerOutstanding(c.id,jobs,work,cfg),
    lifetimeValueAED:customerLifetimeValue(c.id,jobs,work,cfg),
  }));
  const jobSummary=(jobs||[]).map(j=>{
    const co=costOf(j,work,cfg);
    const hrs=jobLabourHours(j,work);
    const byEmp={};
    (work||[]).filter(w=>w.job===j.id&&isApprovedEntry(w)).forEach(w=>{
      const name=(employees.find(e=>e.id===w.emp)||{}).name||w.emp;
      byEmp[name]=round1((byEmp[name]||0)+hoursBetween(w.start,w.end));
    });
    return {
      id:j.id,client:j.client,customerId:j.customerId,stream:j.stream,project:j.project,
      currentStage:j.stage,validStagesForThisStream:pathFor(j.stream),
      deliveryDate:j.delivery,daysToDelivery:daysBetween(workDate,j.delivery),
      paymentStatus:j.pay,valueAED:j.value,team:j.team,
      sizing:(j.sizing&&j.sizing.custom)?{custom:true,measurements:j.sizing.measurements}:{custom:false,sizes:(j.sizing&&j.sizing.sizes)||{},completedUnits:sizeCompleted(j),provisionalUnits:sizeProvisional(j),totalUnits:sizeUnits(j)},
      materialsUsed:(j.costing&&j.costing.materials)||[],
      totalCostAED:round1(co.total),sellingPriceAED:co.price,marginAED:round1(co.margin),
      hoursLoggedTotal:hrs,hoursByEmployee:byEmp,
      embroideryNotes:j.embroideryNotes||"",productionNotes:j.productionNotes||"",deliveryNotes:j.deliveryNotes||"",
    };
  });
  const empSummary=(employees||[]).filter(e=>e.active).map(e=>({id:e.id,name:e.name,dept:e.dept,engagement:e.engagement}));
  const apptSummary=(appts||[]).map(a=>({type:a.type,client:a.client,customerId:a.customerId,job:a.job,date:a.date,time:a.time,status:a.status,notes:a.notes}));
  const quoteSummary=(quotes||[]).map(q=>{const t=quoteTotals(q);return {id:q.id,client:q.client,customerId:q.customerId,job:q.job,status:q.status,totalAED:t.total,date:q.date};});
  const taskSummary=(tasks||[]).map(t=>({id:t.id,title:t.title,assignee:(employees.find(e=>e.id===t.assignee)||{}).name||t.assignee,dueDate:t.dueDate,priority:t.priority,status:t.status,job:t.job}));
  const invSummary=(inventory||[]).map(i=>({id:i.id,name:i.name,category:i.category,qtyOnHand:i.qtyOnHand,unit:i.unit,reorderLevel:i.reorderLevel,belowReorder:Number(i.qtyOnHand)<=Number(i.reorderLevel),costPerUnit:i.costPerUnit,supplier:i.supplier}));
  const pendingApprovalCount=(work||[]).filter(w=>!isApprovedEntry(w)).length;
  return {today:workDate,house:cfg.house,customers:custSummary,jobs:jobSummary,employees:empSummary,appointments:apptSummary,quotations:quoteSummary,tasks:taskSummary,inventory:invSummary,workEntriesPendingApproval:pendingApprovalCount,note:"Hours/cost figures above only include Approved work entries; "+pendingApprovalCount+" entries are still Pending Approval and excluded until reviewed."};
}
